<nav
  class="bg-gradient-to-r from-purple-500 via-violet-500 to-indigo-500 px-6 py-3 flex items-center justify-between shadow-md">

  <div routerLink="/" class="text-xl font-bold text-white tracking-wide">
    FinTrack
  </div>

  <ul class="hidden md:flex gap-6 font-medium text-white/90">
    <li><a routerLink="/" class="hover:text-yellow-300 transition">Home</a></li>
    <li><a routerLink="/about" class="hover:text-yellow-300 transition">About</a></li>
    <li><a routerLink="/contact" class="hover:text-yellow-300 transition">Contact</a></li>
    <li><a routerLink="/upload" class="hover:text-yellow-300 transition">Upload</a></li>
    <li><a routerLink="/analytics" class="hover:text-yellow-300 transition">Analytics</a></li>
  </ul>

  <div class="flex items-center gap-3">

    @if (auth.isAuthenticated()) {

    <button [hlmDropdownMenuTrigger]="menu" class="text-white hover:text-yellow-300 transition flex items-center">
      <lucide-icon [img]="user" class="w-6 h-6"></lucide-icon>
    </button>

    <ng-template #menu>
      <hlm-dropdown-menu>

        <hlm-dropdown-menu-label>
          My Account
        </hlm-dropdown-menu-label>

        <hlm-dropdown-menu-separator />

        <button hlmDropdownMenuItem (click)="auth.logout()" class="text-red-500 hover:text-red-600">
          Logout
        </button>

      </hlm-dropdown-menu>
    </ng-template>

    }
    @else {
    <button routerLink="/login"
      class="bg-white/10 backdrop-blur-md text-white px-4 py-1.5 rounded-lg border border-white/20 hover:bg-white/20 transition">
      Login </button>
    <button routerLink="/sign-up"
      class="bg-gradient-to-r from-yellow-400 to-orange-400 text-black font-semibold px-4 py-1.5 rounded-lg shadow hover:scale-105 transition">
      Sign Up </button>
    }

  </div>

</nav>
