<div class="min-h-screen flex text-gray-800 bg-brand-bg transition-colors duration-300">
  <!-- Left Side: Image / Illustration -->
  <div class="hidden lg:flex lg:w-1/2 relative bg-brand-primary items-center justify-center overflow-hidden">
    <!-- Image placeholder mapping to generated abstract graphic -->
    <img src="/auth_background.png" alt="Abstract Finance Illustration" class="absolute object-cover w-full h-full opacity-90 mix-blend-multiply" />
    <div class="absolute inset-0 bg-gradient-to-t from-brand-secondary/80 to-transparent"></div>
    <div class="relative z-10 p-12 max-w-lg text-brand-bg">
      <h1 class="text-4xl font-bold mb-4 tracking-tight">Join FinTrack Today</h1>
      <p class="text-xl opacity-90">Unlock new possibilities. Register now to experience seamless operations.</p>
    </div>
  </div>

  <!-- Right Side: Signup Form -->
  <div class="flex-1 flex flex-col justify-center py-12 px-4 sm:px-6 lg:flex-none lg:w-1/2 lg:px-20 xl:px-24">
    <div class="mx-auto w-full max-w-sm">
      <h2 class="text-4xl font-extrabold text-brand-primary tracking-tight mb-2">Create an account</h2>
      <p class="text-sm font-medium text-brand-secondary mb-8">
        Already have an account? 
        <a routerLink="/login" class="font-bold text-brand-success hover:scale-105 transition-transform inline-block">Sign in</a>
      </p>

      <div class="bg-white/40 backdrop-blur-md rounded-2xl shadow-xl ring-1 ring-brand-secondary/20 p-8 transform transition-all duration-300 hover:shadow-2xl hover:-translate-y-1">
        <form class="space-y-6" (ngSubmit)="onSubmit($event)">
          <!-- Email Input -->
          <div>
            <label for="email" class="block text-sm font-semibold text-brand-primary">Email address</label>
            <div class="mt-2">
              <input 
                id="email" [(ngModel)]="email" name="email" type="email" autocomplete="email" required 
                class="block w-full rounded-lg border-0 py-2.5 px-3 bg-white/50 text-gray-900 shadow-sm ring-1 ring-inset ring-brand-secondary/50 focus:ring-2 focus:ring-inset focus:ring-brand-primary sm:text-sm transition-shadow duration-200" 
                placeholder="name@example.com"
              />
            </div>
          </div>

          <!-- Password Input -->
          <div>
            <label for="password" class="block text-sm font-semibold text-brand-primary">Password</label>
            <div class="mt-2 text-right">
              <input 
                id="password" [(ngModel)]="password" name="password" type="password" autocomplete="new-password" required minlength="8" 
                class="block w-full rounded-lg border-0 py-2.5 px-3 bg-white/50 text-gray-900 shadow-sm ring-1 ring-inset ring-brand-secondary/50 focus:ring-2 focus:ring-inset focus:ring-brand-primary sm:text-sm transition-shadow duration-200 text-left" 
                placeholder="••••••••"
              />
            </div>
          </div>

          <!-- Error Message -->
          <div *ngIf="errorMessage" class="text-sm text-red-600 font-semibold text-center mt-2 animate-pulse">
            {{ errorMessage }}
          </div>

          <!-- Submit Button -->
          <div>
            <button 
              type="submit" 
              class="flex w-full justify-center rounded-lg bg-brand-primary px-3 py-3 text-sm font-bold text-white shadow-lg hover:bg-[#8f7562] focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-brand-primary transition-all duration-300 hover:scale-[1.02]">
              Sign up
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
