<div class="min-h-screen flex flex-col md:flex-row">

  <div class="md:w-1/2 w-full bg-gradient-to-br from-purple-600 to-blue-500 flex items-center justify-center">
    <div class="border-2 border-dashed border-white/60 text-white px-10 py-20 rounded-xl text-center">
      Image Area
    </div>
  </div>

  <div class="md:w-1/2 w-full flex items-center justify-center bg-gray-100 px-6">

    <div class="w-full max-w-md bg-white rounded-2xl shadow-xl p-8">

      <h2 class="text-2xl font-bold text-gray-800">Welcome Back</h2>
      <p class="text-sm text-gray-500 mb-6">Login to your account</p>

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-4">

        <!-- Email -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
          <input type="email" formControlName="employeeEmail"
            class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500" />

          <div *ngIf="loginForm.get('employeeEmail')?.touched && loginForm.get('employeeEmail')?.invalid">
            <small class="text-red-500 text-xs">Email is invalid</small>
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
          <input type="password" formControlName="employeePassword"
            class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500" />

          <div *ngIf="loginForm.get('employeePassword')?.touched && loginForm.get('employeePassword')?.invalid">
            <small class="text-red-500 text-xs">Password must be at least 6 characters</small>
          </div>
        </div>

        <button type="submit" [disabled]="loginForm.invalid"
          class="w-full bg-purple-600 text-white py-2 rounded-lg hover:bg-purple-700 transition disabled:opacity-50">
          Login
        </button>

      </form>

      <p class="text-sm text-center text-gray-600 mt-6">
        Don’t have an account?
        <a routerLink="/sign-up" class="text-purple-600 font-medium hover:underline cursor-pointer">
          Sign Up
        </a>
      </p>

    </div>

  </div>

</div>
